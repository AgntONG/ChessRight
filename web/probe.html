<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>SF Verify</title></head>
<body>
<pre id="out">running...</pre>
<script type="module">
import { Engine, LEVELS } from './scripts/play/engine.js';
const out = document.getElementById('out');
const log = [];
function push(s){ log.push(s); out.textContent = log.join('\n'); }

push('LEVELS table length: ' + LEVELS.length + ' (expect 20)');
push('  L1:  ' + JSON.stringify(LEVELS[0]));
push('  L10: ' + JSON.stringify(LEVELS[9]));
push('  L20: ' + JSON.stringify(LEVELS[19]));

const KIWIPETE = 'r3k2r/p1ppqpb1/bn2pnp1/3PN3/1p2P3/2N2Q1p/PPPBBPPP/R3K2R w KQkq - 0 1';

const eng = new Engine({
  workerUrl: './assets/stockfish/stockfish-nnue-16-single.js',
  cdnUrl: null,
  onError: (e) => push('ERR: ' + e.message),
});
let t0 = performance.now();
await eng.ready();
push('handshake done in ' + Math.round(performance.now()-t0) + 'ms; NNUE enabled = ' + eng.isNnueEnabled());

push('setLevel(1) -> ' + JSON.stringify(LEVELS[0]));
await eng.setLevel(1);
push('setLevel(20) -> ' + JSON.stringify(LEVELS[19]));
await eng.setLevel(20);

push('=== analyze depth 18 Kiwipete (live profile) ===');
t0 = performance.now();
const r1 = await eng.analyze({ fen: KIWIPETE, depth: 18, movetime: 2000 });
push('  live: best='+r1.best+' cp='+r1.cp+' depth='+r1.depth+' '+(Math.round(performance.now()-t0))+'ms');

push('=== deepAnalyze depth 22 movetime 3000 Kiwipede ===');
t0 = performance.now();
const r2 = await eng.deepAnalyze({ fen: KIWIPETE, depth: 22, movetime: 3000 });
push('  deep: best='+r2.best+' cp='+r2.cp+' depth='+r2.depth+' '+(Math.round(performance.now()-t0))+'ms');

push('DONE');
</script>
</body>
</html>
