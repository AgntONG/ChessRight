name = "chessright-api"
main = "src/index.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "chessright"
database_id = "<set-via-wrangler-d1-create>"

[[durable_objects.bindings]]
name = "MATCH_QUEUE"
class_name = "MatchQueue"

[[migrations]]
tag = "v1"
new_classes = ["MatchQueue"]

[vars]
CORS_ORIGIN = "http://localhost:8785"
